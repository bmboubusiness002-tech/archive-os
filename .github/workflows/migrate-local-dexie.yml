name: Migrate Local Dexie Cache

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout archive-os
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run migration
        env:
          MIGRATION_TOKEN: ${{ secrets.MIGRATION_TOKEN }}
        run: |
          chmod +x scripts/migrate-local-dexie-cache.sh
          ./scripts/migrate-local-dexie-cache.sh

      - name: Commit migrated artifacts
        run: |
          git add legacy/local-dexie-cache
          git commit -m "chore(migration): import Local Dexie Cache artifacts" || echo "No changes to commit"
          git push
